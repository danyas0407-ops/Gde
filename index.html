<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Чепуха: Версия 2026</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    .container { max-width: 400px; margin: 0 auto; }
    input, button { width: 100%; padding: 15px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    button { background: #007bff; color: white; border: none; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Чепуха</h1>
    <div id="lobby">
      <input type="text" id="name" placeholder="Имя">
      <input type="text" id="code" placeholder="Код (ABCD)">
      <button onclick="join()">Создать или войти</button>
    </div>
    <div id="game" class="hidden">
      <h2 id="q">Вопрос</h2>
      <input type="text" id="ans" placeholder="Ответ...">
      <button onclick="send()">Отправить</button>
    </div>
  </div>

  <script>
    // Используем готовое публичное API для хранения состояния (это не требует базы)
    const API = "https://jsonblob.com/api/jsonBlob/";
    const BLOB_ID = "1260904037542912000"; // Замени на свой уникальный ID (создай на jsonblob.com)

    let state = { players: [], step: 0, answers: {} };

    // Функция-опрос: она "будит" сервер каждые 1.5 сек
    async function sync() {
      const res = await fetch(API + BLOB_ID);
      state = await res.json();
      updateUI();
    }
    
    // Отправка ответа
    async function send() {
      const val = document.getElementById('ans').value;
      state.answers[document.getElementById('name').value] = val;
      await fetch(API + BLOB_ID, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(state)
      });
    }

    setInterval(sync, 1500); // Таймер, который не дает игре заснуть
  </script>
</body>
</html>
