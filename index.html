<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игра: Чепуха</title>
  
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  
  <style>
    body { font-family: sans-serif; background: #f4f4f9; text-align: center; padding: 20px; margin: 0; }
    .container { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: 20px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input, button { width: 90%; margin: 10px 0; padding: 15px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
    button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #0056b3; }
    .btn-green { background: #28a745; }
    .hidden { display: none !important; }
    .story { text-align: left; background: #eee; padding: 15px; margin-top: 15px; border-radius: 8px; font-size: 16px; line-height: 1.5; }
    #playersUl { text-align: left; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container" id="app">
    <h1>📝 Чепуха</h1>
    
    <div id="lobby-screen">
      <input type="text" id="playerName" placeholder="Твоё имя">
      <button onclick="createRoom()">Создать игру</button>
      <hr style="margin: 20px 0; border-color: #eee;">
      <input type="text" id="roomCode" placeholder="КОД (НАПРИМЕР ABCD)" maxlength="4" style="text-transform: uppercase;">
      <button onclick="joinRoom()" class="btn-green">Присоединиться</button>
    </div>

    <div id="waiting-screen" class="hidden">
      <h2>Комната: <span id="roomTitleCode"></span></h2>
      <p>Игроки:</p>
      <ul id="playersUl"></ul>
      <button id="startBtn" class="btn-green hidden" onclick="startHostGame()">Начать игру</button>
    </div>

    <div id="game-screen" class="hidden">
      <h3 id="questionText" style="font-size: 22px; color: #007bff;">Вопрос</h3>
      <input type="text" id="answerInput" placeholder="Твой ответ...">
      <button id="sendBtn" onclick="sendAnswer()">Отправить ✉️</button>
      <p id="waitText" class="hidden" style="color: #666; margin-top: 20px; font-weight: bold;">Ждем остальных игроков...</p>
    </div>

    <div id="result-screen" class="hidden">
      <h2>🎉 Истории готовы:</h2>
      <div id="storiesContainer"></div>
      <button onclick="location.reload()" style="background: #28a745; margin-top: 20px;">Новая игра</button>
    </div>
  </div>

  <script>
    const questions = ["Кто?", "С кем?", "Где?", "Когда?", "Что делали?", "Что им сказали?", "Чем всё закончилось?"];
    
    let client = null;
    let roomTopic = "";
    let myId = Math.random().toString(36).substring(2, 10);
    let myName = "";
    let isHost = false;
    
    let players = [];
    let papers = [];
    let currentStep = 0;
    
    let answeredThisRound = new Set();
    let hasConnectedOnce = false;

    function connectMqtt(code, onConnect) {
      roomTopic = 'chepuha-game-rus-' + code;
      
      // Отключили keepalive (0), чтобы сервер не придирался к микро-разрывам связи
      client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
        keepalive: 0,
        reconnectPeriod: 1000,
        clean: true
      });

      client.on('connect', () => {
        client.subscribe(roomTopic);
        // Выполняем UI-логику только при самом первом подключении
        if (!hasConnectedOnce) {
          hasConnectedOnce = true;
          onConnect();
        }
      });

      // УБРАЛ ВЫВОД ОШИБОК НА ЭКРАН!
      // Если будет сбой, библиотека просто тихо переподключится в фоне.
      client.on('error', (err) => {
        console.warn("Тихий сбой сети: ", err);
      });

      client.on('message', (topic, msg) => {
        const data = JSON.parse(msg.toString());

        if (isHost) {
          if (data.type === 'join' && data.id !== myId) {
            if (!players.find(p => p.id === data.id)) {
              players.push({ id: data.id, name: data.name });
              updatePlayersUI();
              broadcast({ type: 'sync_players', players: players });
            }
          }
          if (data.type === 'answer' && data.id !== myId) {
             handleAnswer(data.id, data.text, data.step);
          }
        }

        if (!isHost) {
          if (data.type === 'sync_players') {
            players = data.players;
            updatePlayersUI();
          }
          if (data.type === 'start') {
            startGameUI();
          }
          if (data.type === 'next_round') {
            startRoundUI(data.step);
          }
          if (data.type === 'end') {
            showResultsUI(data.papers);
          }
        }
      });
    }

    function broadcast(obj) {
      if(client) client.publish(roomTopic, JSON.stringify(obj));
    }

    function createRoom() {
      myName = document.getElementById('playerName').value.trim();
      if (!myName) return alert('Введи имя!');

      const code = Math.random().toString(36).substring(2, 6).toUpperCase();
      isHost = true;
      players = [{ id: myId, name: myName }];

      connectMqtt(code, () => {
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('waiting-screen').classList.remove('hidden');
        document.getElementById('roomTitleCode').innerText = code;
        document.getElementById('startBtn').classList.remove('hidden');
        updatePlayersUI();
      });
    }

    function joinRoom() {
      myName = document.getElementById('playerName').value.trim();
      const code = document.getElementById('roomCode').value.trim().toUpperCase();
      if (!myName || !code) return alert('Введи имя и код!');

      isHost = false;
      connectMqtt(code, () => {
        broadcast({ type: 'join', id: myId, name: myName });
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('waiting-screen').classList.remove('hidden');
        document.getElementById('roomTitleCode').innerText = code;
      });
    }

    function updatePlayersUI() {
      const ul = document.getElementById('playersUl');
      ul.innerHTML = '';
      players.forEach(p => {
        const li = document.createElement('li');
        li.innerText = p.name;
        ul.appendChild(li);
      });
    }

    function startHostGame() {
      if (players.length < 2) return alert("Нужно хотя бы 2 игрока!");
      
      papers = Array(players.length).fill().map(() => []);
      currentStep = 0;
      answeredThisRound.clear();
      
      broadcast({ type: 'start' });
      startGameUI();
    }

    function startGameUI() {
      document.getElementById('waiting-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      startRoundUI(0);
    }

    function startRoundUI(step) {
      currentStep = step;
      document.getElementById('questionText').innerText = questions[step];
      document.getElementById('answerInput').value = '';
      document.getElementById('answerInput').classList.remove('hidden');
      document.getElementById('sendBtn').classList.remove('hidden');
      document.getElementById('waitText').classList.add('hidden');
    }

    function sendAnswer() {
      const text = document.getElementById('answerInput').value.trim();
      if (!text) return alert("Напиши ответ!");

      document.getElementById('answerInput').classList.add('hidden');
      document.getElementById('sendBtn').classList.add('hidden');
      document.getElementById('waitText').classList.remove('hidden');

      if (isHost) {
        handleAnswer(myId, text, currentStep);
      } else {
        broadcast({ type: 'answer', id: myId, text: text, step: currentStep });
      }
    }

    function handleAnswer(playerId, text, step) {
      if (step !== currentStep) return;
      if (answeredThisRound.has(playerId)) return;

      const playerIndex = players.findIndex(p => p.id === playerId);
      if (playerIndex === -1) return;
      
      let paperIndex = (playerIndex - currentStep) % players.length;
      if (paperIndex < 0) paperIndex += players.length;

      papers[paperIndex][currentStep] = text;
      answeredThisRound.add(playerId);

      if (answeredThisRound.size === players.length) {
        answeredThisRound.clear();
        currentStep++;
        
        if (currentStep >= questions.length) {
          broadcast({ type: 'end', papers: papers });
          showResultsUI(papers);
        } else {
          broadcast({ type: 'next_round', step: currentStep });
          startRoundUI(currentStep);
        }
      }
    }

    function showResultsUI(finalPapers) {
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');

      const container = document.getElementById('storiesContainer');
      finalPapers.forEach((paper, i) => {
        const story = `${paper[0]} и ${paper[1]} находились ${paper[2]} ${paper[3]}. Там они ${paper[4]}. Им сказали: «${paper[5]}». И всё закончилось тем, что ${paper[6]}.`;
        const div = document.createElement('div');
        div.className = 'story';
        div.innerHTML = `<span style="color:#007bff">Листок от: ${players[i].name}</span><br><br>${story}`;
        container.appendChild(div);
      });
    }
  </script>
</body>
</html>
