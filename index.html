<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игра: Чепуха</title>
  
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  
  <style>
    body { font-family: sans-serif; background: #f4f4f9; text-align: center; padding: 20px; margin: 0; }
    .container { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: 20px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input, button { width: 90%; margin: 10px 0; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
    button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #0056b3; }
    .btn-green { background: #28a745; }
    .btn-green:hover { background: #218838; }
    .hidden { display: none !important; }
    #playersList { text-align: left; background: #eee; padding: 10px; border-radius: 5px; }
  </style>
</head>
<body>

  <div class="container" id="app">
    <h1>📝 Чепуха</h1>
    
    <div id="lobby-screen">
      <input type="text" id="playerName" placeholder="Твоё имя">
      <button onclick="createRoom()">Создать игру</button>
      
      <hr style="margin: 20px 0; border-color: #eee;">
      
      <input type="text" id="roomCode" placeholder="КОД (НАПРИМЕР ABCD)" maxlength="4" style="text-transform: uppercase;">
      <button onclick="joinRoom()" class="btn-green">Присоединиться</button>
    </div>

    <div id="game-screen" class="hidden">
      <h2 id="roomTitle">Комната: </h2>
      <p id="gameStatus">Ожидаем игроков...</p>
      
      <div id="playersList">
        <strong>Игроки:</strong>
        <ul id="playersUl"></ul>
      </div>
      
      <button id="startBtn" class="btn-green hidden" onclick="startGame()">Начать игру</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
