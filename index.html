<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игра: Чепуха</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
  
  <style>
    body { font-family: sans-serif; background: #f4f4f9; text-align: center; padding: 20px; margin: 0; }
    .container { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: 20px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input, button { width: 90%; margin: 10px 0; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
    button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #0056b3; }
    .btn-green { background: #28a745; }
    .btn-green:hover { background: #218838; }
    .hidden { display: none !important; }
    #playersList { text-align: left; background: #eee; padding: 10px; border-radius: 5px; margin-top: 15px; }
  </style>
</head>
<body>

  <div class="container" id="app">
    <h1>📝 Чепуха</h1>
    
    <div id="lobby-screen">
      <input type="text" id="playerName" placeholder="Твоё имя">
      <button onclick="createRoom()">Создать игру</button>
      
      <hr style="margin: 20px 0; border-color: #eee;">
      
      <input type="text" id="roomCode" placeholder="КОД (НАПРИМЕР ABCD)" maxlength="4" style="text-transform: uppercase;">
      <button onclick="joinRoom()" class="btn-green">Присоединиться</button>
    </div>

    <div id="game-screen" class="hidden">
      <h2 id="roomTitle">Комната: </h2>
      <p id="gameStatus">Ожидаем игроков...</p>
      
      <div id="playersList">
        <strong>Игроки:</strong>
        <ul id="playersUl"></ul>
      </div>
      
      <button id="startBtn" class="btn-green hidden" onclick="startGame()">Начать игру</button>
    </div>
  </div>

  <script>
    let peer = null;
    let hostConnection = null; 
    let guestConnections = []; 
    let players = []; 
    let isHost = false;
    let myName = "";

    function showGameScreen(code) {
      document.getElementById('lobby-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      document.getElementById('roomTitle').innerText = `Комната: ${code}`;
      if (isHost) {
        document.getElementById('startBtn').classList.remove('hidden');
      }
    }

    function updatePlayersUI() {
      const ul = document.getElementById('playersUl');
      ul.innerHTML = '';
      players.forEach(p => {
        const li = document.createElement('li');
        li.innerText = p.name;
        ul.appendChild(li);
      });
    }

    function createRoom() {
      try {
        myName = document.getElementById('playerName').value.trim();
        if (!myName) {
          alert('Введи имя!');
          return;
        }

        // Проверяем, загрузилась ли библиотека из интернета
        if (typeof Peer === 'undefined') {
          alert("Ошибка: Библиотека связи не загрузилась. Проверь интернет или выключи блокировщик рекламы!");
          return;
        }

        const code = Math.random().toString(36).substring(2, 6).toUpperCase();
        const fullRoomId = 'chepuha-game-' + code; 

        peer = new Peer(fullRoomId);

        peer.on('open', (id) => {
          isHost = true;
          players.push({ name: myName, id: id });
          updatePlayersUI();
          showGameScreen(code);
        });

        peer.on('connection', (conn) => {
          guestConnections.push(conn);
          conn.on('data', (data) => {
            if (data.type === 'join') {
              players.push({ name: data.name, id: conn.peer });
              updatePlayersUI();
              guestConnections.forEach(c => c.send({ type: 'updatePlayers', players: players }));
            }
          });
        });

        peer.on('error', (err) => {
          alert("Сетевая ошибка PeerJS: " + err.type);
        });
        
      } catch (e) {
        alert("Ошибка в коде: " + e.message);
      }
    }

    function joinRoom() {
      try {
        myName = document.getElementById('playerName').value.trim();
        const code = document.getElementById('roomCode').value.trim().toUpperCase();
        
        if (!myName || !code) {
          alert('Введи имя и код!');
          return;
        }

        if (typeof Peer === 'undefined') {
          alert("Ошибка: Библиотека связи не загрузилась.");
          return;
        }

        const fullRoomId = 'chepuha-game-' + code;
        peer = new Peer();

        peer.on('open', (id) => {
          hostConnection = peer.connect(fullRoomId);

          hostConnection.on('open', () => {
            hostConnection.send({ type: 'join', name: myName });
            showGameScreen(code);
          });

          hostConnection.on('data', (data) => {
            if (data.type === 'updatePlayers') {
              players = data.players;
              updatePlayersUI();
            }
          });
        });

        peer.on('error', (err) => {
          alert("Не удалось найти комнату! Проверь код. (Ошибка: " + err.type + ")");
        });

      } catch (e) {
        alert("Ошибка в коде: " + e.message);
      }
    }

    function startGame() {
      alert("Всё работает! Теперь можно писать логику вопросов.");
    }
  </script>
</body>
</html>
